<!doctype html>

<!-- Home page -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard — Monvixx</title>
    <meta name="description" content="Monvixx: a simple money manager and tracker." />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="topbar">
      <div class="container topbar__inner">
        <div class="brand">
          <div class="brand__logo" aria-hidden="true">M</div>
          <div class="brand__text">
            <div class="brand__name">Monvixx</div>
            <div class="brand__tag">Money Manager & Tracker</div>
          </div>
        </div>

        <nav class="tabs" aria-label="Primary">
          <a class="tab" href="./index.html" aria-current="page">Dashboard</a>
          <a class="tab" href="./transactions.html">Transactions</a>
          <a class="tab" href="./budgets.html">Budgets</a>
          <a class="tab" href="./settings.html">Settings</a>
        </nav>
      </div>
    </header>

    <main id="main" class="container main">
      <section>
        <div class="grid grid--2">
          <section class="card">
            <header class="card__header">
              <h2 class="card__title">This month</h2>
              <div class="card__actions">
                <label class="select">
                  <span class="sr-only">Month</span>
                  <select id="monthSelect"></select>
                </label>
              </div>
            </header>
            <div class="stats">
              <div class="stat">
                <div class="stat__label">Income</div>
                <div class="stat__value" id="statIncome">$0</div>
              </div>
              <div class="stat">
                <div class="stat__label">Expenses</div>
                <div class="stat__value stat__value--danger" id="statExpenses">$0</div>
              </div>
              <div class="stat">
                <div class="stat__label">Net</div>
                <div class="stat__value" id="statNet">$0</div>
              </div>
            </div>
            <div class="divider"></div>
            <div class="card-chart">
              <canvas id="summaryChart" height="190" aria-label="Donut chart for budget used"></canvas>
            </div>
          </section>

          <section class="card">
            <header class="card__header">
              <h2 class="card__title">Quick add</h2>
            </header>

            <form id="quickAddForm" class="form">
              <div class="grid grid--2">
                <label class="field">
                  <span class="field__label">Type</span>
                  <select name="type" required>
                    <option value="expense" selected>Expense</option>
                    <option value="income">Income</option>
                  </select>
                </label>
                <label class="field">
                  <span class="field__label">Amount</span>
                  <input name="amount" inputmode="decimal" placeholder="0.00" required />
                </label>
              </div>

              <label class="field">
                <span class="field__label">Category</span>
                <select name="category" id="quickAddCategory"></select>
              </label>

              <label class="field">
                <span class="field__label">Note</span>
                <input name="note" maxlength="120" placeholder="e.g. groceries, salary" />
              </label>

              <div class="grid grid--2">
                <label class="field">
                  <span class="field__label">Date</span>
                  <input name="date" type="date" required />
                </label>
                <label class="field">
                  <span class="field__label">Payment method</span>
                  <select name="method">
                    <option value="cash">Cash</option>
                    <option value="card" selected>Card</option>
                    <option value="transfer">Transfer</option>
                    <option value="other">Other</option>
                  </select>
                </label>
              </div>

              <div class="actions">
                <button type="submit" class="btn btn--primary">Add</button>
                <button type="button" class="btn" id="quickAddToTransactions">View all</button>
              </div>
              <p class="hint" id="quickAddHint" role="status" aria-live="polite"></p>
            </form>
          </section>
        </div>

        <section class="card card--spaced">
          <header class="card__header">
            <h2 class="card__title">Top spending (month)</h2>
          </header>
          <div id="topSpending" class="list list--striped"></div>
          <p class="empty" id="topSpendingEmpty">No expenses in this month yet.</p>
        </section>
      </section>
    </main>
    <script type="module" src="./js/pages/dashboard.js"></script>
  </body>
</html>
